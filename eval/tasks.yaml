# Eval suite: 50 tasks across doc_lookup, pr_triage, issue_clustering, and
# agent routing/multi-step.
#
# doc_lookup/routing/multi_step tasks run through `agent.agent.run_agent()`
# (so routing is exercised, not just the tool). pr_triage/issue_clustering
# tasks call the tool directly against the fixtures in `eval/fixtures.py`.
#
# `requires_live_llm: true` marks tasks the offline hashing-embedding /
# keyword-routing fallback cannot meaningfully attempt (judging that no
# answer exists in the corpus, or calling two tools in one turn) -- these
# are reported as SKIPPED rather than scored when no OPENAI_API_KEY is
# configured. See README's Evaluation section.

# ---------------------------------------------------------------------------
# doc_lookup (20): self-referential -- these ask the agent about its own
# source code, indexed via `sift index .` from the repo root.
# ---------------------------------------------------------------------------
