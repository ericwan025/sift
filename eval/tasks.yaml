# ---------------------------------------------------------------------------
# routing / multi_step (10): tests whether the agent (or, offline, the
# keyword router) picks the right tool -- and, for the last two, whether it
# can chain two tools in one turn.
# ---------------------------------------------------------------------------
- id: rt_001
  type: routing
  query: "How does the retry/backoff logic work in this codebase?"
  expected: {must_route_to: doc_lookup}
  difficulty: easy

- id: rt_002
  type: routing
  query: "What is the status of open pull requests right now?"
  expected: {must_route_to: pr_triage}
  difficulty: easy

- id: rt_003
  type: routing
  query: "Can you group the open issues into themes?"
  expected: {must_route_to: issue_clustering}
  difficulty: easy

- id: rt_004
  type: routing
  query: "What's your favorite programming language?"
  expected: {must_route_to: null}
  difficulty: ambiguous

- id: rt_005
  type: routing
  query: "Where is CODEOWNERS parsed for reviewer suggestions?"
  expected: {must_route_to: doc_lookup}
  difficulty: easy

- id: rt_006
  type: routing
  query: "Summarize the pull request backlog by priority"
  expected: {must_route_to: pr_triage}
  difficulty: easy

- id: rt_007
  type: routing
  query: "Are there duplicate issues in the backlog?"
  expected: {must_route_to: issue_clustering}
  difficulty: easy

- id: rt_008
  type: routing
  query: "What is 2+2?"
  expected: {must_route_to: null}
  difficulty: ambiguous

- id: rt_009
  type: multi_step
  query: "Summarize open PRs and also explain how the retry/backoff logic works"
  expected: {must_call_tools: [pr_triage, doc_lookup]}
  difficulty: multi_step
  requires_live_llm: true

- id: rt_010
  type: multi_step
  query: "Cluster the open issues and tell me how the FAISS index is loaded"
  expected: {must_call_tools: [issue_clustering, doc_lookup]}
  difficulty: multi_step
  requires_live_llm: true
